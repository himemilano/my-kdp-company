name: 📚 KDP Publisher Limitless Loop

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-kdp-limitless:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # CrewAIとその自動化に必要なライブラリ群をインストール
        pip install requests crewai langchain-google-genai pydantic

    - name: Run KDP Autonomy Loop
      env:
        # 会長から教えていただいた正しいAPIキー名（GitHub Secretsに登録されている名前）
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_KDP }}
        API_KEY: ${{ secrets.GEMINI_API_KEY_KDP }}
      run: |
        echo "=== 📚 KDP自律稼働ハイパードライブ 起動 ==="
        python kdp_loop_runner.py

