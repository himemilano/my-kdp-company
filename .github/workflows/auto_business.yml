name: 📚 KDP Publisher One-Shot Advance

on:
  schedule:
    # 毎日 日本時間 10:50, 14:50, 17:50
    - cron: '50 1,5,8 * * *'
  workflow_dispatch: # 手動で即時開発を指示できるボタン

permissions:
  contents: write

jobs:
  run-kdp-limitless:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # crewaiが正常に動作するために必要なライブラリ群
        pip install requests crewai langchain-google-genai pydantic

    - name: Run KDP Autonomy
      env:
        # 🔑 最新のcrewaiの要求に合わせて、両方の変数名でSecretsキーを完璧に注入します！
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_KDP }}
        GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY_KDP }}
        API_KEY: ${{ secrets.GEMINI_API_KEY_KDP }}
      run: python main.py

    - name: Commit and Push Progress
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add -A
        git commit -m "📚 [KDP出版部] 本日の成果物をコミットして定時退勤します ($(date))" || echo "変更なし"
        git push
