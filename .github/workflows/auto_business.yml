name: 📚 KDP Publisher Limitless Loop

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true
on:
  schedule:
    - cron: '0 * * * *' # 毎時0分に起動して常時コンテナを稼働
  workflow_dispatch: # 手動即時起動ボタン

permissions:
  contents: write # 生成された小説などの成果物をGitHubへ自動コミット・プッシュする権限

jobs:
  run-kdp-limitless:
    runs-on: ubuntu-latest
    timeout-minutes: 350 # 最大約6時間のコンテナ維持限界

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    # 🚀 トップ階層の常時自律ループランナーを起動
    - name: Run KDP Autonomy Loop
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_FX }}
      run: |
        echo "=== 📚 KDP自律稼働ハイパードライブ 起動 ==="
        python kdp_loop_runner.py

