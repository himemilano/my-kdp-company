name: 📚 KDP Publisher One-Shot Advance

on:
  schedule:
    # 毎日 日本時間 10:50, 14:50, 17:50
    - cron: '50 1,5,8 * * *'
  workflow_dispatch: # 手動で即時開発を指示できるボタン

permissions:
  contents: write

jobs:
  run-kdp-limitless:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      # requests および config.yml 読み込み用の pyyaml をインストール
      run: |
        python -m pip install --upgrade pip
        pip install requests pyyaml

    - name: Run KDP Autonomy
      env:
        # 🔑 main.pyの要求する変数名と、GitHub Secretsのキーを完全に結合！
        GEMINI_API_KEY_MY_KDP: ${{ secrets.GEMINI_API_KEY_MY_KDP }}
      run: python main.py

    - name: Commit and Push Progress
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add -A
        git commit -m "📚 [KDP出版部] 本日の成果物をコミットして定時退勤します" || echo "変更なし"
        git push
