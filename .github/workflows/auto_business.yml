name: AI Company Daily Autonomous Operation

on:
  schedule:
    # 毎日 日本時間 10:30, 14:30, 17:30（UTC 1:30, 5:30, 8:30）に自動起動
    - cron: '30 1,5,8 * * *'
  workflow_dispatch: # 会長が好きな時に手動で「今すぐ動け」と命令できるボタンも残します

jobs:
  run-ai-organization:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/with-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install crewai langchain-google-genai requests

    - name: Run AI Company Operations
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python main.py

    - name: Commit and Push Daily Progress
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add -A
        # 今日動いたフェーズを日報のコミットメッセージにする
        git commit -m "🤖 [AIチーム] 本日の業務完了。成果物および引き継ぎ帳をデスクに格納しました (${{ datetime }})" || echo "変更なし"
        git push
