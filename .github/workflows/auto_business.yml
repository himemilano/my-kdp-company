name: 📚 KDP Publisher Limitless Loop

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-kdp-limitless:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # CrewAIとその関連モジュール、その他必要なパッケージをすべてインストール
        pip install requests crewai langchain-google-genai

    - name: Run KDP Autonomy Loop
      env:
        # APIキーを複数の候補名でコンテナに確実に注入
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_FX }}
        API_KEY: ${{ secrets.GEMINI_API_KEY_FX }}
      run: |
        echo "=== 📚 KDP自律稼働ハイパードライブ 起動 ==="
        python kdp_loop_runner.py


